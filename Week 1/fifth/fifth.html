<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>User Registration</h1>
    <div style="border: 1px solid">
      <form action="">
        <label for="">Personal Details</label>
        <br />
        <label for="">First Name: </label> <input type="text" />
        <br />
        <label for="">Last Name: </label> <input type="text" />
        <br />
        <label for="">Age: </label> <input type="number" />
        <br />
        <label for="">Gender: </label
        ><select name="" id="">
          <option value="0">Choose...</option>
          <option value="1">Male</option>
          <option value="2">Female</option>
        </select>
        <br />
        <label for="">Profile Picture</label>
        <button><input type="image" /></button>
      </form>
    </div>
    <br />
    <div style="border: 1px solid">
      <form action="">
        <label for="">Account Details</label>
        <br />
        <label for="">Email: </label><input type="email" />
        <br />
        <label for="">Password: </label><input type="password" />
        <br />
        <label for="">Role:</label> <input type="radio" value="Admin" /> Admin
        <input type="radio" value="User" /> User
      </form>
    </div>
    <br />
    <div><input type="checkbox" /> I agree to the terms and conditions</div>
    <br />
    <button type="submit">Register</button> <button type="reset">Reset</button>
    <br /><br />
    <footer>&copy; 2026 Shlok Ghimire</footer>
  </body>
</html>
